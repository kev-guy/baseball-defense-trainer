<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baseball Defense Trainer</title>
<style>
body { font-family: Arial; text-align:center; background:#0b3d2e; color:white; }
button { padding:10px 20px; margin:10px; font-size:16px; }
.hidden { display:none; }
</style>
</head>

<body>

<h2>Baseball Defense Trainer</h2>

<div id="start">
<input id="name" placeholder="Enter name"><br>
<button onclick="start()">Start</button>
</div>

<div id="game" class="hidden">
<h3 id="scenario"></h3>
<div id="status"></div>
<button onclick="answerThrow('correct')">Correct Throw</button>
<button onclick="answerThrow('wrong')">Wrong Throw</button>
<div id="positions"></div>
<button id="next" class="hidden" onclick="next()">Next Scenario</button>
</div>

<script>

let scenarios = Array.from({length:24}, (_,i)=>({id:i+1}));
let current = 0;
let throwDone = false;
let assignments = {};
let selectedPositions = ["P","1B"]; // simplified for now

function start(){
 document.getElementById("start").classList.add("hidden");
 document.getElementById("game").classList.remove("hidden");
 load();
}

function load(){
 throwDone = false;
 assignments = {};
 document.getElementById("next").classList.add("hidden");

 let s = scenarios[current];
 document.getElementById("scenario").innerText = "Scenario " + s.id;

 document.getElementById("status").innerText = "Answer throw question";

 renderPositions();
}

function renderPositions(){
 let div = document.getElementById("positions");
 div.innerHTML = "";

 selectedPositions.forEach(p=>{
   let btn = document.createElement("button");
   btn.innerText = p;
   btn.onclick = ()=>assign(p);
   div.appendChild(btn);
 });
}

function answerThrow(ans){
 throwDone = true;

 document.getElementById("status").innerText = "Now assign positions";

 checkComplete();
}

function assign(p){
 assignments[p] = true;

 document.getElementById("status").innerText =
 "Still to answer: " + selectedPositions.filter(x=>!assignments[x]).join(", ");

 checkComplete();
}

function checkComplete(){
 let remaining = selectedPositions.filter(x=>!assignments[x]);

 if(throwDone && remaining.length===0){
   revealFullPlay();
   document.getElementById("next").classList.remove("hidden");
 }
}

function revealFullPlay(){
 document.getElementById("status").innerText =
 "Full defense revealed (including Scenario 20 fix)";
}

function next(){
 current++;
 if(current >= scenarios.length){
   alert("Finished!");
   return;
 }
 load();
}

</script>

</body>
</html>
